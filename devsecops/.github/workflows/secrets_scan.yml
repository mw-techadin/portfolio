name: Secrets Scan (gitleaks)

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments on violations

jobs:
  gitleaks:
    name: Detect secrets with gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits in the PR
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: post a comment on the PR listing found secrets
          GITLEAKS_ENABLE_COMMENTS: "true"
        with:
          # On PRs: scan only the commits introduced by this PR.
          # On push events base_ref is empty, so scan HEAD commit only.
          args: ${{ github.event_name == 'pull_request' && format('--log-opts=origin/{0}..HEAD', github.base_ref) || '--log-opts=-1' }}

      - name: Upload gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7

      - name: Fail with summary
        if: failure()
        run: |
          echo "::error::gitleaks detected potential secrets in this PR."
          echo "Review the gitleaks-report artifact or the PR comment for details."
          echo "Remove or rotate any exposed credentials before merging."
          exit 1

  # Optional second job: notify Slack on main branch violations
  notify-slack:
    name: Notify Slack on secret leak (main only)
    runs-on: ubuntu-latest
    needs: gitleaks
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Send Slack alert
        uses: slackapi/slack-github-action@v2
        with:
          payload: |
            {
              "text": ":rotating_light: *Secret detected on main!*\nRepo: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Action Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
